<!DOCTYPE html>
<html lang="EN-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <title>HomeChat</title>
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-card: #171a26;
            --bg-card-soft: #1e2233;
            --text-main: #f2f4ff;
            --text-muted: #adb5d9;
            --accent: #6ea8fe;
            --accent-2: #71f5c7;
            --border: #2a3351;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        div#chat {
            color: var(--text-main);
            background: linear-gradient(180deg, #111523 0%, #0d111d 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: min(900px, 94vw);
            max-height: 80vh;
            overflow-y: auto;
            padding: 14px;
            box-shadow: var(--shadow);
        }

        div#smiliki {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 380px;
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--bg-card-soft);
            border: 1px solid var(--border);
        }

        div#smiliki>span#icon {
            font-size: 25px;
        }

        div.msgdiv {
            background-color: var(--bg-card-soft);
            color: var(--text-main);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        div#smiliki:hover>span:not(#icon) {
            visibility: visible;
        }

        div#smiliki>span:not(#icon) {
            visibility: hidden;
            cursor: pointer;
            -webkit-user-select: none;
            /* Safari */
            -moz-user-select: none;
            /* Firefox */
            -ms-user-select: none;
            /* IE10+ */
            user-select: none;
            /* Standard */
        }

        div#smiliki>span:hover:not(#icon) {
            background-color: rgba(110, 168, 254, 0.24);
            border-radius: 8px;
            transform: translateY(-1px);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(1200px circle at top, #1b2340 0%, var(--bg-main) 45%, #090b12 100%);
            color: var(--text-main);
            max-height: 80vh;
            min-height: 100vh;
            margin: 0;
            padding-top: 18px;
            padding-bottom: 100px;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
        }

        #writemsg {
            display: flex;
            gap: 10px;
            align-items: center;
            bottom: 10px;
            position: fixed;
            background: rgba(14, 17, 27, 0.9);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
            box-shadow: var(--shadow);
        }


        input#nameInput {
            width: 130px;
        }

        #chatForm {
            display: flex;
            gap: 8px;
        }

        #chatForm input,
        #chatForm button {
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            padding: 8px 10px;
        }

        #chatForm input#hello {
            width: min(48vw, 520px);
        }

        #chatForm button {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #0b1020;
            font-weight: 600;
            cursor: pointer;
        }

        #chatForm button:hover {
            filter: brightness(1.06);
        }
    </style>
</head>

<body>
    <div id="chat"></div>
    <audio style="display: none;">
        <source src="/ding" type="audio/wav">
    </audio>
    <div id="writemsg">
        <form id="chatForm" action="/writemsg" method="get">
            <input type="text" id="nameInput" name="Blame" placeholder="Your name" required>
            <input type="text" name="abracadabra" required id="hello" autocomplete="off"></input>
            <button>Send</button>
        </form>
        <div id="smiliki">
            <span id="icon">😀</span>
            <span aria-valuenow=":smilehearts">🥰</span>
            <span aria-valuenow=":congratulations">🎉</span>
            <span aria-valuenow=":cool">😎</span>
            <span aria-valuenow=":laughing">🤣</span>
            <span aria-valuenow=":heart">❤️</span>
            <span aria-valuenow=":smile">😀</span>
            <span aria-valuenow=":sad">😢</span>
            <span aria-valuenow=":food">🍔</span>
            <span aria-valuenow=":phoenix">🐦‍🔥</span>
            <span aria-valuenow=":fire">🔥</span>
            <span aria-valuenow=":clouds">😶‍🌫️</span>
            <span aria-valuenow=":crying">😭</span>
            <span aria-valuenow=":glad">☺️</span>
            <span aria-valuenow=":insane">😈</span>
            <span aria-valuenow=":laptop">💻</span>
            <span aria-valuenow=":book">📖</span>

        </div>

    </div>
    <script>
        document.body.addEventListener("click", function unlockAudio() {
            // создаём крошечный звуковой объект
            let silent = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=");
            silent.volume = 0; // на всякий случай
            silent.play().catch(() => { });
            // убираем обработчик, чтобы не мучить юзера дальше
            document.body.removeEventListener("click", unlockAudio);
        });
    </script>

    <script>

        // Restore name from localStorage
        document.getElementById('nameInput').value = localStorage.getItem('chatName') || '';

        // Save name to localStorage on input
        document.getElementById('nameInput').addEventListener('input', function () {
            localStorage.setItem('chatName', this.value);
        });

        function notify() {

            let audio = document.querySelector("audio")
            audio.querySelector("source").src = "/ding?r=" + Date.now()
            audio.load()
            audio.play()

        }
        let lastIndex = 0;
        async function getChatHistory() {
            try {
                let response = await fetch("/chathistory");
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                let text = await response.text();

                let array = text.split("\\n")
                let chathistory = document.getElementById("chat");

                if (lastIndex != array.length) {
                    chathistory.innerHTML = ""
                    if (lastIndex != 0) {
                        notify()
                    }
                    array.forEach(element => {
                        let formattedElement = element.replace(/\"/g, "").replace(/:smile/g, "😀").replace(/:food/g, "🍔").replace(/:laptop/g, "💻").replace(/:book/g, "📖").replace(/:sad/g, "😢").replace(/:insane/g, "😈").replace(/:crying/g, "😭").replace(/:clouds/g, "😶‍🌫️").replace(/:glad/g, "☺️").replace(/:fire/g, "🔥").replace(/:phoenix/g, "🐦‍🔥").replace(/:heart/g, "❤️").replace(/:laughing/g, "🤣").replace(/:smilehearts/g, "🥰").replace(/:cool/g, "😎").replace(/:congratulations/g, "🎉")
                        if (formattedElement) {
                            let msgdiv = document.createElement("div")
                            msgdiv.className = "msgdiv"
                            msgdiv.innerHTML = formattedElement
                            chathistory.appendChild(msgdiv)
                        }
                    });
                    chathistory.scrollTop = chathistory.scrollHeight;

                }


                lastIndex = array.length
            } catch (error) {
                console.error('Ошибка при запросе:', error);
                document.getElementById('chat').textContent = 'Не удалось загрузить данные.';
            }
        }
        getChatHistory()
        setInterval(getChatHistory, 2500)
    </script>
    <script>
        document.querySelector("input#hello").focus()
    </script>
    <script>
        for (elem of document.querySelectorAll("div#smiliki > span")) {
            elem.addEventListener("click", function () {
                document.querySelector("#hello").value += this.getAttribute("aria-valuenow")
                document.querySelector("#hello").focus()
            })
        }


    </script>

</body>

</html>
